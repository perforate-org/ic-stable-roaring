name: Quality

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust 1.90.0
        run: |
          rustup toolchain install 1.90.0 --profile minimal --component rustfmt --component clippy
          rustup default 1.90.0
          rustc --version
          cargo --version
          rg --version

      - name: Check formatting
        run: cargo fmt --check

      - name: Run tests
        run: cargo test --all-features

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run journal layout matrix
        run: scripts/test_layout_matrix.sh

  fuzz-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pinned nightly and cargo-fuzz
        run: |
          rustup toolchain install nightly-2025-08-07 --profile minimal
          cargo +nightly-2025-08-07 install cargo-fuzz --version 0.12.0 --locked

      - name: Build fuzz targets
        working-directory: fuzz
        run: cargo +nightly-2025-08-07 fuzz build
