name: Quality

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lean:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check generated journal model freshness
        run: audit/scripts/check-journal-model.sh

      - name: Build Lean audit
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1.5.0
        with:
          lake-package-directory: audit
          auto-config: false
          build: true
          test: false
          lint: false

      - name: Check Lean proof hygiene
        shell: bash
        run: |
          if rg -n '\b(sorry|axiom)\b|UNDERSPECIFIED|True := by|: True' audit --glob '*.lean'; then
            echo "Lean audit contains a prohibited proof placeholder or vacuous claim"
            exit 1
          fi

  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust 1.90.0
        run: |
          rustup toolchain install 1.90.0 --profile minimal --component rustfmt --component clippy
          rustup default 1.90.0
          rustc --version
          cargo --version

      - name: Resolve dependencies
        run: cargo generate-lockfile

      - name: Check formatting
        run: cargo fmt --check

      - name: Run tests
        run: cargo test --locked --all-features

      - name: Run Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Build documentation
        run: RUSTDOCFLAGS=-Dwarnings cargo doc --locked --no-deps --all-features

      - name: Run journal layout matrix
        run: scripts/test_layout_matrix.sh

  fuzz-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pinned nightly and cargo-fuzz
        run: |
          rustup toolchain install nightly-2025-08-07 --profile minimal
          cargo +nightly-2025-08-07 install cargo-fuzz --version 0.12.0 --locked

      - name: Build fuzz targets
        working-directory: fuzz
        run: cargo +nightly-2025-08-07 fuzz build

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust 1.90.0
        run: rustup toolchain install 1.90.0 --profile minimal

      - name: Resolve dependencies
        run: cargo +1.90.0 generate-lockfile

      - name: Install cargo-audit
        run: cargo +stable install cargo-audit --locked

      - name: Install cargo-deny
        run: cargo +stable install cargo-deny --locked

      - name: Audit dependencies
        run: cargo +1.90.0 audit

      - name: Check dependency policy
        run: cargo +1.90.0 deny check
